name: AAC Codec Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-level-1:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install numpy soundfile scipy matplotlib
    
    - name: Run Level 1 Test
      run: |
        cd level_1
        python test_level_1.py
    
    - name: Upload output audio
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: level-1-output
        path: output.wav
        retention-days: 7
